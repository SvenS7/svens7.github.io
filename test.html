<!DOCTYPE html>
<html>
<head>
  <style>
    .sticky {
      position: sticky;
      top: 0;
      background-color: #f1f1f1;
      padding: 10px;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="sticky">
    This div will stay on top while scrolling.
  </div>
  <div style="height: 2000px;">
    <!-- Content here -->
  </div>
</body>
</html>
